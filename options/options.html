<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>History Blocker — Options</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
          <line x1="4" y1="4" x2="20" y2="20" stroke="#ff6b6b" stroke-width="2.5"/>
        </svg>
      </div>
      <div>
        <h1>History Blocker</h1>
        <p class="subtitle">Manage sites excluded from browser history</p>
      </div>
      <div class="header-status" id="headerStatus"></div>
    </header>

    <!-- Add section -->
    <section class="card add-section">
      <h2>Add Sites</h2>
      <p class="hint">Click a tab domain to add it, or type a domain / <code>/regex/</code> and press Enter</p>
      <div class="input-row">
        <div class="tags-input-wrapper" id="tagsInputWrapper">
          <div class="tab-domains" id="tabDomains"></div>
          <input type="text" id="siteInput"
                 placeholder="e.g. example.com or /.*\.example\.com/"
                 autocomplete="off" spellcheck="false">
        </div>
            <button class="btn-add" id="addBtn" title="Add site"></button>
      </div>
    </section>

    <!-- Blocked sites -->
    <section class="card table-section">
      <h2>
        Blocked Sites
        <span class="count" id="siteCount">0</span>
      </h2>
      <div class="table-container">
        <div class="empty-state" id="emptyState">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.3">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="9" y1="15" x2="15" y2="15"/>
          </svg>
          <p>No blocked sites yet</p>
          <p class="hint">Add domains above or click the toolbar button on any tab</p>
        </div>
        <div class="sites-list" id="sitesList"></div>
      </div>
    </section>

    <!-- Bottom actions -->
    <div class="actions-bar" id="actionsBar">
      <div class="actions-info">
        <span class="dirty-dot"></span>
        <span>Unsaved changes</span>
      </div>
      <div class="actions-buttons">
        <button class="btn btn-ghost" id="resetBtn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="1 4 1 10 7 10"/>
            <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
          </svg>
          Discard
        </button>
        <button class="btn btn-save" id="saveBtn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
            <polyline points="17 21 17 13 7 13 7 21"/>
            <polyline points="7 3 7 8 15 8"/>
          </svg>
          Save Changes
        </button>
      </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Edit modal -->
    <div class="modal-overlay" id="editModal">
      <div class="modal">
        <h3>Edit Entry</h3>
        <input type="text" id="editInput" class="edit-input" spellcheck="false" />
        <div class="modal-actions">
          <button class="btn btn-ghost" id="editCancel">Cancel</button>
          <button class="btn btn-primary" id="editSave">Update</button>
        </div>
      </div>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
